<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reflex — 3D Reaction Timer</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #0F172A;
  --surface: #1E293B;
  --surface-hover: #263348;
  --text: #F1F5F9;
  --text-secondary: #94A3B8;
  --ready: #10B981;
  --waiting: #F59E0B;
  --result: #3B82F6;
  --error: #EF4444;
}

html, body {
  height: 100%;
  font-family: 'JetBrains Mono', monospace;
  background: var(--bg);
  color: var(--text);
  overflow: hidden;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
}

#app {
  display: flex;
  flex-direction: column;
  height: 100%;
  padding: 16px;
  gap: 12px;
}

/* Header */
header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 4px;
  flex-shrink: 0;
}

.logo {
  font-family: 'Outfit', sans-serif;
  font-weight: 800;
  font-size: 22px;
  letter-spacing: -0.5px;
  background: linear-gradient(135deg, var(--result) 0%, #a78bfa 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.logo span {
  font-weight: 400;
  font-size: 12px;
  background: none;
  -webkit-text-fill-color: var(--text-secondary);
  margin-left: 8px;
  letter-spacing: 2px;
  text-transform: uppercase;
}

.header-right {
  display: flex;
  align-items: center;
  gap: 16px;
}

.header-stat {
  text-align: right;
}

.header-stat-label {
  font-size: 9px;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--text-secondary);
  margin-bottom: 1px;
}

.header-stat-value {
  font-size: 15px;
  font-weight: 600;
  color: var(--text);
}

/* Game box */
.game-box {
  flex: 1;
  position: relative;
  border-radius: 20px;
  overflow: hidden;
  cursor: pointer;
  border: 1px solid rgba(148, 163, 184, 0.1);
  background: var(--surface);
  transition: border-color 0.4s ease, box-shadow 0.4s ease;
  min-height: 0;
}

[data-state="waiting"] .game-box {
  border-color: rgba(245, 158, 11, 0.25);
  box-shadow: inset 0 0 60px rgba(245, 158, 11, 0.04);
}

[data-state="ready"] .game-box {
  border-color: rgba(16, 185, 129, 0.35);
  box-shadow: inset 0 0 80px rgba(16, 185, 129, 0.06), 0 0 30px rgba(16, 185, 129, 0.08);
}

[data-state="result"] .game-box {
  border-color: rgba(59, 130, 246, 0.25);
  box-shadow: inset 0 0 60px rgba(59, 130, 246, 0.04);
}

[data-state="early"] .game-box {
  border-color: rgba(239, 68, 68, 0.3);
  box-shadow: inset 0 0 60px rgba(239, 68, 68, 0.05);
}

#three-canvas {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  display: block;
}

/* Reaction time — top right overlay */
.reaction-overlay {
  position: absolute;
  top: 20px;
  right: 24px;
  z-index: 10;
  text-align: right;
  opacity: 0;
  transform: translateY(-8px);
  transition: all 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
  pointer-events: none;
}

.reaction-overlay.visible {
  opacity: 1;
  transform: translateY(0);
}

.reaction-time {
  font-family: 'Outfit', sans-serif;
  font-weight: 800;
  font-size: clamp(40px, 8vw, 72px);
  line-height: 1;
  letter-spacing: -2px;
}

.reaction-unit {
  font-size: clamp(14px, 2.5vw, 20px);
  font-weight: 400;
  color: var(--text-secondary);
  margin-left: 2px;
  letter-spacing: 0;
}

.reaction-label {
  font-size: 12px;
  color: var(--text-secondary);
  margin-top: 4px;
  font-family: 'JetBrains Mono', monospace;
}

/* State message — bottom left of game box */
.state-message {
  position: absolute;
  bottom: 24px;
  left: 28px;
  z-index: 10;
  pointer-events: none;
}

.state-title {
  font-family: 'Outfit', sans-serif;
  font-weight: 700;
  font-size: clamp(20px, 4vw, 32px);
  transition: color 0.3s ease;
}

.state-subtitle {
  font-size: clamp(11px, 1.6vw, 14px);
  color: var(--text-secondary);
  font-weight: 400;
  line-height: 1.5;
  max-width: 380px;
  margin-top: 4px;
}

[data-state="idle"] .state-title { color: var(--text-secondary); }
[data-state="waiting"] .state-title { color: var(--waiting); }
[data-state="ready"] .state-title { color: var(--ready); }
[data-state="result"] .state-title { color: var(--result); }
[data-state="result"] .reaction-time { color: var(--result); }
[data-state="early"] .state-title { color: var(--error); }
[data-state="early"] .reaction-time { color: var(--error); }

/* Bottom bar */
.bottom-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  flex-shrink: 0;
  padding: 0 4px;
}

.stats-row {
  display: flex;
  gap: 6px;
}

.stat-pill {
  background: var(--surface);
  border: 1px solid rgba(148, 163, 184, 0.08);
  border-radius: 10px;
  padding: 8px 14px;
  display: flex;
  align-items: baseline;
  gap: 6px;
}

.stat-label {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text-secondary);
}

.stat-value {
  font-size: 15px;
  font-weight: 600;
}

.btn-group {
  display: flex;
  gap: 6px;
}

.btn {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  font-weight: 500;
  padding: 10px 18px;
  border: 1px solid rgba(148, 163, 184, 0.12);
  border-radius: 10px;
  background: var(--surface);
  color: var(--text);
  cursor: pointer;
  transition: all 0.2s ease;
  white-space: nowrap;
}

.btn:hover { background: var(--surface-hover); border-color: rgba(148, 163, 184, 0.2); }

.btn-primary { background: var(--result); border-color: var(--result); color: #fff; }
.btn-primary:hover { background: #2563eb; border-color: #2563eb; }

/* Mobile */
@media (max-width: 600px) {
  #app { padding: 10px; gap: 8px; }
  .game-box { border-radius: 16px; }
  .state-message { bottom: 16px; left: 18px; }
  .reaction-overlay { top: 14px; right: 16px; }
  .bottom-bar { flex-direction: column; gap: 8px; }
  .stats-row { width: 100%; justify-content: center; }
  .btn-group { width: 100%; justify-content: center; }
  .stat-pill { padding: 6px 10px; }
  .stat-value { font-size: 13px; }
}

@media (max-width: 380px) {
  .logo span { display: none; }
}
</style>
</head>
<body>
<div id="app" data-state="idle">

  <header>
    <div class="logo">REFLEX<span>3D Timer</span></div>
    <div class="header-right">
      <div class="header-stat">
        <div class="header-stat-label">Attempts</div>
        <div class="header-stat-value" id="h-attempts">0</div>
      </div>
      <div class="header-stat">
        <div class="header-stat-label">Best</div>
        <div class="header-stat-value" id="h-best">—</div>
      </div>
    </div>
  </header>

  <div class="game-box" id="game-box">
    <canvas id="three-canvas"></canvas>

    <div class="reaction-overlay" id="reaction-display">
      <div class="reaction-time" id="reaction-time"></div>
      <div class="reaction-label" id="reaction-label"></div>
    </div>

    <div class="state-message">
      <div class="state-title" id="state-title">Test Your Reflexes</div>
      <div class="state-subtitle" id="state-subtitle">Click here or press Space to begin</div>
    </div>
  </div>

  <div class="bottom-bar">
    <div class="stats-row">
      <div class="stat-pill">
        <span class="stat-label">Avg</span>
        <span class="stat-value" id="s-avg">—</span>
      </div>
      <div class="stat-pill">
        <span class="stat-label">Best</span>
        <span class="stat-value" id="s-best" style="color:var(--ready)">—</span>
      </div>
      <div class="stat-pill">
        <span class="stat-label">Last</span>
        <span class="stat-value" id="s-last" style="color:var(--result)">—</span>
      </div>
      <div class="stat-pill">
        <span class="stat-label">Tries</span>
        <span class="stat-value" id="s-tries">0</span>
      </div>
    </div>
    <div class="btn-group">
      <button class="btn" onclick="resetGame()">Reset</button>
      <button class="btn btn-primary" id="btn-start" onclick="handleAction()">Start</button>
    </div>
  </div>

</div>

<script>
// ========== STATE ==========
let state = 'idle';
let waitTimeout = null;
let stimulusTime = 0;
let attempts = [];

function setState(s) {
  state = s;
  document.getElementById('app').setAttribute('data-state', s);
}

// ========== THREE.JS ==========
const canvas = document.getElementById('three-canvas');
const gameBox = document.getElementById('game-box');

const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setClearColor(0x1E293B, 1);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(45, 1, 0.1, 100);
camera.position.set(0, 0, 6);

// Lighting
scene.add(new THREE.AmbientLight(0x94A3B8, 0.4));

const keyLight = new THREE.PointLight(0x3B82F6, 2.5, 25);
keyLight.position.set(3, 3, 5);
scene.add(keyLight);

const fillLight = new THREE.PointLight(0xa78bfa, 1.5, 20);
fillLight.position.set(-3, -1, 4);
scene.add(fillLight);

const rimLight = new THREE.PointLight(0x10B981, 1, 18);
rimLight.position.set(0, -4, -3);
scene.add(rimLight);

// Central group
const group = new THREE.Group();
scene.add(group);

// Torus knot — the hero shape
const knotGeo = new THREE.TorusKnotGeometry(1.0, 0.35, 128, 32, 2, 3);
const knotMat = new THREE.MeshStandardMaterial({
  color: 0x3B82F6,
  metalness: 0.45,
  roughness: 0.15,
  emissive: 0x3B82F6,
  emissiveIntensity: 0.08
});
const knot = new THREE.Mesh(knotGeo, knotMat);
group.add(knot);

// Glass-like outer shell
const shellGeo = new THREE.IcosahedronGeometry(1.9, 2);
const shellMat = new THREE.MeshPhysicalMaterial({
  color: 0x3B82F6,
  metalness: 0.0,
  roughness: 0.1,
  transparent: true,
  opacity: 0.07,
  wireframe: true,
  side: THREE.DoubleSide
});
const shell = new THREE.Mesh(shellGeo, shellMat);
group.add(shell);

// Fine wireframe ring
const ringGeo = new THREE.TorusGeometry(2.2, 0.008, 8, 80);
const ringMat = new THREE.MeshBasicMaterial({ color: 0x3B82F6, transparent: true, opacity: 0.2 });
const ring = new THREE.Mesh(ringGeo, ringMat);
group.add(ring);

// Subtle particles inside
const dotCount = 60;
const dotGeo = new THREE.BufferGeometry();
const dotPos = new Float32Array(dotCount * 3);
for (let i = 0; i < dotCount; i++) {
  const theta = Math.random() * Math.PI * 2;
  const phi = Math.acos(2 * Math.random() - 1);
  const r = 1.4 + Math.random() * 0.5;
  dotPos[i*3]   = r * Math.sin(phi) * Math.cos(theta);
  dotPos[i*3+1] = r * Math.sin(phi) * Math.sin(theta);
  dotPos[i*3+2] = r * Math.cos(phi);
}
dotGeo.setAttribute('position', new THREE.BufferAttribute(dotPos, 3));
const dotMat = new THREE.PointsMaterial({ color: 0x94A3B8, size: 0.035, transparent: true, opacity: 0.45, sizeAttenuation: true });
const dots = new THREE.Points(dotGeo, dotMat);
group.add(dots);

// Color transition targets
let tColor = new THREE.Color(0x3B82F6);
let tEmissive = new THREE.Color(0x3B82F6);
let tEmissiveInt = 0.08;
let tShellOp = 0.07;
let tRingOp = 0.2;
let tScale = 1.0;
let cScale = 1.0;

function setColors(hex, emInt, shellOp, ringOp) {
  tColor.set(hex);
  tEmissive.set(hex);
  tEmissiveInt = emInt;
  tShellOp = shellOp;
  tRingOp = ringOp;
}

// Resize handler
function resizeRenderer() {
  const rect = gameBox.getBoundingClientRect();
  const w = rect.width;
  const h = rect.height;
  renderer.setSize(w, h);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
}

const resizeObs = new ResizeObserver(resizeRenderer);
resizeObs.observe(gameBox);
resizeRenderer();

// Animation
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();

  // Smooth lerps
  knotMat.color.lerp(tColor, 0.05);
  knotMat.emissive.lerp(tEmissive, 0.05);
  knotMat.emissiveIntensity += (tEmissiveInt - knotMat.emissiveIntensity) * 0.05;
  shellMat.color.lerp(tColor, 0.04);
  shellMat.opacity += (tShellOp - shellMat.opacity) * 0.05;
  ringMat.color.lerp(tColor, 0.04);
  ringMat.opacity += (tRingOp - ringMat.opacity) * 0.05;
  keyLight.color.lerp(tColor, 0.03);

  // Scale
  cScale += (tScale - cScale) * 0.06;
  let s = cScale;
  if (state === 'ready') {
    s *= 1.0 + Math.sin(t * 7) * 0.04;
  }
  group.scale.setScalar(s);

  // Rotation
  const rSpeed = state === 'ready' ? 1.8 : state === 'waiting' ? 0.5 : 0.3;
  group.rotation.y += rSpeed * 0.016;
  group.rotation.x = Math.sin(t * 0.4) * 0.2;

  // Shell counter-rotate
  shell.rotation.y -= 0.004;
  shell.rotation.x += 0.003;

  // Ring tilt
  ring.rotation.x = Math.PI / 2 + Math.sin(t * 0.6) * 0.15;
  ring.rotation.z += 0.002;

  // Dots drift
  dots.rotation.y += 0.001;
  dots.rotation.x += 0.0005;

  renderer.render(scene, camera);
}
animate();

// ========== GAME LOGIC ==========

function handleAction() {
  switch (state) {
    case 'idle': case 'result': case 'early':
      startWaiting(); break;
    case 'waiting':
      falseStart(); break;
    case 'ready':
      recordReaction(); break;
  }
}

function startWaiting() {
  setState('waiting');
  updateUI('Wait for green...', 'Don\'t click yet!');
  hideReaction();
  updateButton('...');
  setColors(0xF59E0B, 0.04, 0.04, 0.1);
  tScale = 0.8;

  const delay = 1000 + Math.random() * 4000;
  waitTimeout = setTimeout(goReady, delay);
}

function goReady() {
  setState('ready');
  stimulusTime = performance.now();
  updateUI('CLICK NOW!', '');
  setColors(0x10B981, 0.4, 0.18, 0.35);
  tScale = 1.15;
  updateButton('Click!');
}

function recordReaction() {
  const ms = Math.round(performance.now() - stimulusTime);
  setState('result');
  attempts.push(ms);
  showReaction(ms);
  updateStats();
  setColors(0x3B82F6, 0.12, 0.1, 0.2);
  tScale = 1.0;
  updateUI(getRating(ms), 'Click or press Space to go again');
  updateButton('Again');
}

function falseStart() {
  clearTimeout(waitTimeout);
  waitTimeout = null;
  setState('early');
  showReactionEarly();
  setColors(0xEF4444, 0.3, 0.15, 0.25);
  tScale = 0.7;
  updateUI('Too Early!', 'Wait for green before clicking');
  updateButton('Retry');
}

function resetGame() {
  clearTimeout(waitTimeout);
  waitTimeout = null;
  attempts = [];
  setState('idle');
  hideReaction();
  updateStats();
  setColors(0x3B82F6, 0.08, 0.07, 0.2);
  tScale = 1.0;
  updateUI('Test Your Reflexes', 'Click here or press Space to begin');
  updateButton('Start');
}

// ========== UI HELPERS ==========

function updateUI(title, sub) {
  document.getElementById('state-title').textContent = title;
  document.getElementById('state-subtitle').textContent = sub;
}

function updateButton(t) {
  document.getElementById('btn-start').textContent = t;
}

function showReaction(ms) {
  const el = document.getElementById('reaction-display');
  document.getElementById('reaction-time').innerHTML = ms + '<span class="reaction-unit">ms</span>';
  document.getElementById('reaction-label').textContent = getLabel(ms);
  el.classList.add('visible');
}

function showReactionEarly() {
  const el = document.getElementById('reaction-display');
  document.getElementById('reaction-time').innerHTML = '✕';
  document.getElementById('reaction-label').textContent = 'False start';
  el.classList.add('visible');
}

function hideReaction() {
  document.getElementById('reaction-display').classList.remove('visible');
}

function updateStats() {
  const n = attempts.length;
  const best = n ? Math.min(...attempts) : null;
  const avg = n ? Math.round(attempts.reduce((a, b) => a + b, 0) / n) : null;
  const last = n ? attempts[n - 1] : null;

  document.getElementById('h-attempts').textContent = n;
  document.getElementById('h-best').textContent = best !== null ? best + 'ms' : '—';
  document.getElementById('s-avg').textContent = avg !== null ? avg + 'ms' : '—';
  document.getElementById('s-best').textContent = best !== null ? best + 'ms' : '—';
  document.getElementById('s-last').textContent = last !== null ? last + 'ms' : '—';
  document.getElementById('s-tries').textContent = n;
}

function getRating(ms) {
  if (ms < 180) return 'Superhuman!';
  if (ms < 220) return 'Incredible!';
  if (ms < 270) return 'Excellent!';
  if (ms < 340) return 'Great!';
  if (ms < 420) return 'Good';
  return 'Keep Practicing';
}

function getLabel(ms) {
  if (ms < 180) return 'Top 1% reaction';
  if (ms < 220) return 'Faster than most';
  if (ms < 270) return 'Above average';
  if (ms < 340) return 'Solid reaction';
  if (ms < 420) return 'Room to improve';
  return 'Keep warming up';
}

// ========== INPUT ==========

document.getElementById('game-box').addEventListener('click', handleAction);

document.addEventListener('keydown', (e) => {
  if (e.code === 'Space' || e.key === ' ') {
    e.preventDefault();
    handleAction();
  }
});

document.addEventListener('contextmenu', e => e.preventDefault());
</script>
</body>
</html>
